apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: neural-twin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: neural-twin
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  QDRANT_HOST: "qdrant"
  MONGO_HOST: "mongo"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: neural-twin
type: Opaque
data:
  # Base64 encoded values (placeholders)
  OPENAI_API_KEY: "c2stcGxhY2Vob2xkZXItb3BlbmFpLWtleQ=="
  MONGO_PASSWORD: "bGxtX2VuZ2luZWVyaW5n"
